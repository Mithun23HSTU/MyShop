<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buyer Dashboard - MyShop</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="menu-container">
    <div class="logo-container">
      <img src="logo.png" class="logo" alt="MyShop Logo">
      <span class="shop-name">MyShop</span>
    </div>
    <nav class="nav-links" id="navLinks">
      <a href="index.html">Home</a>
      <span id="userSection"></span>
    </nav>
  </div>
</header>

<div class="container">
  <h2>Order History</h2>
  <div id="ordersList"></div>
</div>

<script src="script.js"></script>
<script>
let currentUser = JSON.parse(localStorage.getItem("currentUser"));
if(!currentUser || currentUser.role!=="buyer") location.href="index.html";

// Load orders for this buyer
let orders = JSON.parse(localStorage.getItem("orders")) || [];
let div = document.getElementById("ordersList");
orders.filter(o=>o.buyer===currentUser.user).forEach(o=>{
  let html = `<div class="cart-item"><strong>Date:</strong> ${o.date}<br>`;
  o.products.forEach(p=> html+=`${p.pname} - ${p.offerPrice} BDT<br>`);
  html+="</div>";
  div.innerHTML += html;
});
</script>
</body>
</html>
